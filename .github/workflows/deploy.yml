name: Banking System CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─── Job 1: Build ────────────────────────────────────────────────────
  build:
    name: Build Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: |
          services=(
            "auth-service"
            "account-service"
            "transaction-service"
            "notification-service"
            "audit-service"
            "fraud-service"
            "approval-service"
            "gateway"
          )
          for service in "${services[@]}"; do
            echo "Building $service..."
            cd $service
            mvn clean package -DskipTests -q
            echo "✅ $service built successfully"
            cd ..
          done

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-files
          path: |
            */target/*.jar
          retention-days: 1

  # ─── Job 2: Docker Build and Push ────────────────────────────────────
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download jar artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-files

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          services=(
            "auth-service"
            "account-service"
            "transaction-service"
            "notification-service"
            "audit-service"
            "fraud-service"
            "approval-service"
            "gateway"
          )
          for service in "${services[@]}"; do
            echo "Building and pushing $service..."
            docker build \
              -t $ECR_REGISTRY/banking/$service:latest \
              -t $ECR_REGISTRY/banking/$service:${{ github.sha }} \
              ./$service
            docker push $ECR_REGISTRY/banking/$service:latest
            docker push $ECR_REGISTRY/banking/$service:${{ github.sha }}
            echo "✅ $service pushed to ECR"
          done

  # ─── Job 3: Deploy to EC2 ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/banking-system"

      - name: Create .env and Pull Images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60m
          command_timeout: 60m
          script: |
            cd /home/ubuntu/banking-system
            
            # Create .env file
            cat > .env << 'ENVEOF'
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
            KAFKA_SECURITY_PROTOCOL=SSL
            KAFKA_SSL_KEYSTORE_TYPE=PKCS12
            KAFKA_SSL_KEYSTORE_LOCATION=/home/ubuntu/banking-system/config/keystore.p12
            KAFKA_SSL_KEYSTORE_PASSWORD=${{ secrets.KAFKA_SSL_KEYSTORE_PASSWORD }}
            KAFKA_SSL_KEY_PASSWORD=${{ secrets.KAFKA_SSL_KEY_PASSWORD }}
            KAFKA_SSL_TRUSTSTORE_TYPE=JKS
            KAFKA_SSL_TRUSTSTORE_LOCATION=/home/ubuntu/banking-system/config/client.truststore.jks
            KAFKA_SSL_TRUSTSTORE_PASSWORD=${{ secrets.KAFKA_SSL_TRUSTSTORE_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            AUTH_SERVICE_URL=http://banking-auth:8081
            ACCOUNT_SERVICE_URL=http://banking-account:8082
            TRANSACTION_SERVICE_URL=http://banking-transaction:8083
            NOTIFICATION_SERVICE_URL=http://banking-notification:8084
            AUDIT_SERVICE_URL=http://banking-audit:8085
            FRAUD_SERVICE_URL=http://banking-fraud:8086
            APPROVAL_SERVICE_URL=http://banking-approval:8087
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_S3_FOLDER=${{ secrets.AWS_S3_FOLDER }}
            AWS_REGION=us-east-1
            FILE_UPLOAD_DIR=/home/ubuntu/banking-system/uploads
            ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
            ENVEOF
            
            mkdir -p /home/ubuntu/banking-system/uploads
            echo "✅ .env created with $(wc -l < .env) lines"
            
            # Login to ECR
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS \
              --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
            echo "✅ ECR login successful"
            
            # Pull images one by one
            REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com"
            for service in gateway auth-service account-service transaction-service notification-service audit-service fraud-service approval-service; do
              echo "Pulling banking/$service..."
              docker pull $REGISTRY/banking/$service:latest && \
                echo "✅ $service pulled" || \
                echo "⚠️ $service pull failed - will use cached"
            done
            echo "✅ All images pulled"

      - name: Start Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 10m
          command_timeout: 10m
          script: |
            cd /home/ubuntu/banking-system
            
            # Stop old containers
            docker compose down --remove-orphans || true
            
            # Start all services
            docker compose up -d
            
            # Clean up old images
            docker image prune -f
            
            echo "✅ Services started"
            docker compose ps

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            cd /home/ubuntu/banking-system
            
            echo "Waiting 5 minutes for services to start..."
            sleep 300
            
            docker compose ps
            
            services=(
              "8090:gateway"
              "8081:auth-service"
              "8082:account-service"
              "8083:transaction-service"
              "8084:notification-service"
              "8085:audit-service"
              "8086:fraud-service"
              "8087:approval-service"
            )
            
            all_healthy=true
            for entry in "${services[@]}"; do
              port="${entry%%:*}"
              name="${entry##*:}"
            
              success=false
              for i in 1 2 3 4 5; do
                response=$(curl -s -o /dev/null -w "%{http_code}" \
                  --max-time 15 \
                  http://localhost:$port/actuator/health)
                if [ "$response" = "200" ]; then
                  echo "✅ $name is healthy"
                  success=true
                  break
                else
                  echo "⏳ $name attempt $i (HTTP $response) retrying in 30s..."
                  sleep 30
                fi
              done
            
              if [ "$success" = false ]; then
                echo "❌ $name failed after 5 attempts"
                docker logs $name --tail=30 2>/dev/null || true
                all_healthy=false
              fi
            done
            
            if [ "$all_healthy" = true ]; then
              echo "✅ All services are healthy!"
            else
              echo "⚠️ Some services failed"
              docker compose ps
              exit 1
            fi