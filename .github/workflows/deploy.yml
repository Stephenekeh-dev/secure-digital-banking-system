name: Banking System CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:    # allows manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # Job 1: Build
  build:
    name: Build Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: |
          services=(
            "auth-service"
            "account-service"
            "transaction-service"
            "notification-service"
            "audit-service"
            "fraud-service"
            "approval-service"
            "gateway"
          )
          for service in "${services[@]}"; do
            echo "Building $service..."
            cd $service
            mvn clean package -DskipTests -q
            echo "✅ $service built successfully"
            cd ..
          done

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-files
          path: |
            */target/*.jar
          retention-days: 1

  #   Job 2: Docker Build and Push
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download jar artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-files

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          services=(
            "auth-service"
            "account-service"
            "transaction-service"
            "notification-service"
            "audit-service"
            "fraud-service"
            "approval-service"
            "gateway"
          )
          for service in "${services[@]}"; do
            echo "Building and pushing $service..."
            docker build \
              -t $ECR_REGISTRY/banking/$service:latest \
              -t $ECR_REGISTRY/banking/$service:${{ github.sha }} \
              ./$service
            docker push $ECR_REGISTRY/banking/$service:latest
            docker push $ECR_REGISTRY/banking/$service:${{ github.sha }}
            echo "✅ $service pushed to ECR"
          done

  # ─── Job 3: Deploy to EC2 ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/banking-system"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/banking-system

            # Create .env file from GitHub secrets
            cat > .env << EOF
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
            KAFKA_USERNAME=${{ secrets.KAFKA_USERNAME }}
            KAFKA_PASSWORD=${{ secrets.KAFKA_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_REGION=us-east-1
            ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
            EOF

            # Login to ECR
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS \
              --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            # Pull latest images
            docker compose pull

            # Deploy with zero downtime
            docker compose up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "Deployment completed"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/banking-system

            echo "Waiting 90 seconds for all services to start..."
            sleep 90

            echo "Checking container status..."
            docker compose ps

            echo "Checking logs for errors..."
            docker compose logs --tail=20

            # Check each service health
            services=(
              "8080:gateway"
              "8081:auth-service"
              "8082:account-service"
              "8083:transaction-service"
              "8084:notification-service"
              "8085:audit-service"
              "8086:fraud-service"
              "8087:approval-service"
            )

            all_healthy=true
            for entry in "${services[@]}"; do
              port="${entry%%:*}"
              name="${entry##*:}"
              response=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 10 \
                http://localhost:$port/actuator/health)
              if [ "$response" = "200" ]; then
                echo "✅ $name is healthy"
              else
                echo "❌ $name health check failed (HTTP $response)"
                echo "--- $name logs ---"
                docker compose logs --tail=30 $name 2>/dev/null || true
                all_healthy=false
              fi
            done

            if [ "$all_healthy" = true ]; then
              echo "✅ All services are healthy!"
            else
              echo "⚠️ Some services failed health check"
              docker compose ps
              exit 1
            fi