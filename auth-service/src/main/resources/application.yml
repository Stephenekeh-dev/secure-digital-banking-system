server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      minimum-idle: 1
      maximum-pool-size: 3
      keepalive-time: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL}
      ssl.keystore.type: ${KAFKA_SSL_KEYSTORE_TYPE}
      ssl.keystore.location: ${KAFKA_SSL_KEYSTORE_LOCATION}
      ssl.keystore.password: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      ssl.key.password: ${KAFKA_SSL_KEY_PASSWORD}
      ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE}
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads/}
jwt:
  secret: ${JWT_SECRET}
  expiration: 36000000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method