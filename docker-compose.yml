version: "3.9"

services:

  gateway:
    image: ${ECR_REGISTRY}/banking/gateway:latest
    container_name: banking-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://banking-auth:8081
      ACCOUNT_SERVICE_URL: http://banking-account:8082
      TRANSACTION_SERVICE_URL: http://banking-transaction:8083
      NOTIFICATION_SERVICE_URL: http://banking-notification:8084
      AUDIT_SERVICE_URL: http://banking-audit:8085
      FRAUD_SERVICE_URL: http://banking-fraud:8086
      APPROVAL_SERVICE_URL: http://banking-approval:8087
    depends_on:
      - auth-service
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-",
             "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    image: ${ECR_REGISTRY}/banking/auth-service:latest
    container_name: banking-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      JWT_SECRET: ${JWT_SECRET}
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_FOLDER: ${AWS_S3_FOLDER}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-",
             "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  account-service:
    image: ${ECR_REGISTRY}/banking/account-service:latest
    container_name: banking-account
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-",
             "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  transaction-service:
    image: ${ECR_REGISTRY}/banking/transaction-service:latest
    container_name: banking-transaction
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
    networks:
      - banking-network
    restart: unless-stopped

  notification-service:
    image: ${ECR_REGISTRY}/banking/notification-service:latest
    container_name: banking-notification
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
    networks:
      - banking-network
    restart: unless-stopped

  audit-service:
    image: ${ECR_REGISTRY}/banking/audit-service:latest
    container_name: banking-audit
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
      - /home/ubuntu/banking-system/uploads:/app/uploads
    networks:
      - banking-network
    restart: unless-stopped

  fraud-service:
    image: ${ECR_REGISTRY}/banking/fraud-service:latest
    container_name: banking-fraud
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
    networks:
      - banking-network
    restart: unless-stopped

  approval-service:
    image: ${ECR_REGISTRY}/banking/approval-service:latest
    container_name: banking-approval
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SSL
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_LOCATION: /app/config/keystore.p12
      SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE: JKS
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /app/config/client.truststore.jks
      SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      SPRING_KAFKA_PROPERTIES_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
    volumes:
      - /home/ubuntu/banking-system/config:/app/config:ro
    networks:
      - banking-network
    restart: unless-stopped

networks:
  banking-network:
    driver: bridge