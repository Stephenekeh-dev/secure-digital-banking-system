server:
  port: 8080
  netty:
    max-header-size: 65536

spring:
  application:
    name: gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/transactions/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/audit/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: fraud-service
          uri: ${FRAUD_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/fraud/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: approval-service
          uri: ${APPROVAL_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/approvals/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
    urls:
      - name: auth-service
        url: /auth-service/v3/api-docs
      - name: account-service
        url: /account-service/v3/api-docs
      - name: transaction-service
        url: /transaction-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
      - name: audit-service
        url: /audit-service/v3/api-docs
      - name: fraud-service
        url: /fraud-service/v3/api-docs
      - name: approval-service
        url: /approval-service/v3/api-docs
  api-docs:
    path: /v3/api-docs
    enabled: true

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes