apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: banking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/banking-repo/notification-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SPRING_MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: MAIL_HOST
            - name: SPRING_MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: MAIL_PORT
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: MAIL_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: banking-system
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084